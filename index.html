<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cambiamos tu estancia | Diseño de interiores online</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

/* NAV */
header{
position:fixed;top:0;width:100%;
background:rgba(0,0,0,0.85);
padding:15px 30px;
display:flex;justify-content:space-between;align-items:center;
z-index:1000
}

.logo-text{color:white;font-weight:bold}

nav{display:flex;gap:20px}
nav a{color:white;text-decoration:none;font-size:14px}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;color:white
}

.hero-content{max-width:800px}

.logo-big{width:240px;margin-bottom:20px}

.hero h1{font-size:40px;margin-bottom:20px}

.hero p{margin-bottom:30px}

/* BOTÓN */
.btn{
background:#f4a742;
padding:15px 25px;
color:black;
text-decoration:none;
border-radius:6px;
font-weight:bold
}

/* SECCIONES */
section{padding:100px 20px;text-align:center}

/* SLIDER */
.slider-container{
max-width:600px;
margin:auto;
position:relative;
}

.slider-container img{
width:100%;
display:block;
}

.after{
position:absolute;
top:0;
left:0;
width:50%;
overflow:hidden;
}

.slider{
position:absolute;
top:0;
left:50%;
width:4px;
height:100%;
background:white;
cursor:pointer;
}

/* FORM */
.formulario{
max-width:400px;
margin:auto;
text-align:left;
}

.formulario input,.formulario textarea{
width:100%;
padding:10px;
margin:10px 0;
}

/* FOOTER */
footer{
background:#0d1b2a;
color:white;
padding:20px;
}

</style>
</head>

<body>

<header>
<div class="logo-text">Cambiamos tu estancia</div>

<nav>
<a href="#">Inicio</a>
<a href="#antes">Antes/Después</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">

<img src="logo.PNG" class="logo-big">

<h1>Así quedará tu casa antes de reformarla</h1>

<p>Visualiza el resultado antes de gastar dinero</p>

<a href="#contacto" class="btn">Solicitar diseño</a>

</div>
</section>

<section id="antes">
<h2>Antes / Después</h2>

<div class="slider-container" id="sliderBox">

<img src="https://images.unsplash.com/photo-1556912167-f556f1f39fdf">

<div class="after" id="afterBox">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
</div>

<div class="slider" id="slider"></div>

</div>

</section>

<section id="contacto">
<h2>Solicita tu diseño</h2>

<div class="formulario">
<form action="mailto:cambiamostuestancia@gmail.com" method="post">

<input type="text" placeholder="Nombre" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Tu estancia"></textarea>

<button class="btn">Enviar</button>

</form>
</div>

</section>

<footer>
<p>📧 cambiamostuestancia@gmail.com</p>
</footer>

<script>

const slider = document.getElementById('slider');
const after = document.getElementById('afterBox');

slider.addEventListener('mousedown', startDrag);

function startDrag(e){
document.addEventListener('mousemove', drag);
document.addEventListener('mouseup', stopDrag);
}

function drag(e){
let x = e.clientX;
let box = document.getElementById('sliderBox').getBoundingClientRect();
let position = ((x - box.left)/box.width)*100;

if(position<0) position=0;
if(position>100) position=100;

slider.style.left = position + "%";
after.style.width = position + "%";
}

function stopDrag(){
document.removeEventListener('mousemove', drag);
}

</script>

</body>
</html>
