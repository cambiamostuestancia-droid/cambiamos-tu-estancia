<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cambiamos Tu Estancia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#0f0f14;color:#fff}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:#0f0f14;
z-index:9999;
border-bottom:1px solid #222;
}

.nav-top{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
}

.nav-left{flex:1;}

.nav-title{
flex:2;
text-align:center;
font-size:14px;
font-weight:600;
margin-bottom:2px;
}

.nav-right{
flex:1;
display:flex;
justify-content:flex-end;
align-items:center;
}

.nav-subtitle{
text-align:center;
font-size:11px;
opacity:0.7;
margin-top:-6px; /* 🔥 AQUÍ ESTÁ EL CAMBIO */
padding-bottom:6px;
}

.nav-logo{
height:38px;
}

.nav-links{
display:flex;
gap:20px;
}

.menu-icon{
display:none;
font-size:25px;
cursor:pointer;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
margin-top:110px;
}

.logo{
width:600px;
max-width:90%;
margin-bottom:30px;
}

.hero h1{
font-size:40px;
max-width:700px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
opacity:0.85;
margin-bottom:40px;
line-height:1.6;
}

.btn{
background:#c8a96a;
color:#000;
padding:15px 30px;
border-radius:30px;
text-decoration:none;
cursor:pointer;
display:inline-block;
}

/* SECTIONS */
section{padding:100px 20px}
.container{max-width:1100px;margin:auto}

h2{text-align:center;margin-bottom:10px;font-size:36px}

.divider{
width:80px;
height:2px;
background:#c8a96a;
margin:20px auto;
}

.texto{
max-width:800px;
margin:15px auto;
text-align:center;
line-height:1.7;
opacity:0.85;
}

/* SERVICIOS */
.servicios-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.servicio{
background:#1a1a22;
padding:25px;
border-radius:15px;
text-align:center;
}

/* PROCESO */
#proceso .texto{
margin-bottom:10px;
}

/* PROYECTOS */
.proyecto{
margin-bottom:80px;
padding:25px;
background:#1a1a22;
border-radius:15px;
}

.proyecto-titulo{
text-align:center;
margin-bottom:15px;
font-size:18px;
opacity:0.8;
}

.before-after{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.before-after img{
width:100%;
border-radius:10px;
}

/* FRASE */
.frase{
text-align:center;
font-size:20px;
margin:80px 0;
opacity:0.9;
}

/* FORMULARIO */
.formulario{
max-width:500px;
margin:40px auto;
display:flex;
flex-direction:column;
gap:15px;
}

.formulario input,.formulario textarea{
padding:12px;
border:none;
border-radius:8px;
}

.formulario button{
background:#c8a96a;
border:none;
padding:15px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.centro{
text-align:center;
margin-top:15px;
}

footer{
text-align:center;
padding:40px;
opacity:0.6;
}

@media(max-width:768px){

.menu-icon{display:block}

.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:0;
background:#0f0f14;
width:100%;
text-align:center;
padding:20px;
}

.nav-links.active{display:flex}

.before-after{grid-template-columns:1fr}
}
</style>
</head>

<body>

<nav>
<div class="nav-top">
<div class="nav-left">
<img src="logo.PNG" class="nav-logo">
</div>

<div class="nav-title">
CAMBIAMOS TU ESTANCIA
</div>

<div class="nav-right">
<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="menu">
<a href="#inicio">Inicio</a>
<a href="#servicios">Servicio</a>
<a href="#proyectos">Proyectos</a>
<a href="#planes">Planes</a>
<a href="#proceso">Cómo trabajamos</a>
<a href="#contacto">Contacto</a>
</div>
</div>
</div>

<div class="nav-subtitle">
Visualiza tu casa antes de cambiarla
</div>
</nav>
